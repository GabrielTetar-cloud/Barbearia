                                <option value="18">18:30</option>
                                <option value="19">19:00
                                </option>

                            </optgroup>

                        </select>

                    <div class="marcar">
                        <i class="fa-solid fa-scissors"></i>
                        <label for="icorte">Selecione um corte</label>

                            <option value="2">Corte barba</option>
                            <option value="3">Corte cabelo + barba</option>

                    <div class="marcar">

                        <label for="iprof">Selecione um barbeiro</label>
                         <select name="prof" id="iprof" required>
